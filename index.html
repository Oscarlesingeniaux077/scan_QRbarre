
  <!DOCTYPE html>
<html lang="fr">
<head>
   <script src="./app.js"></script>
<link rel="stylesheet" href="./style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion avec redirection</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0ecff, #f8fbff);
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .message {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>

<div class="box">
  <h2>Connexion</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
    <div id="message" class="message"></div>
  </form>
</div>

<div class="footer">
      Pas encore de compte ? <a href="Créerun_compte.html">Créer un compte</a>
    </div>
  </div>

<script>
  const form = document.getElementById('loginForm');
  const message = document.getElementById('message');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Simulation de vérification (à remplacer par backend réel)
    if (email === "admin077@gmail.com" && password === "20261010") {
      message.textContent = "Connexion réussie, redirection...";
      message.className = "message success";

      // Redirection après 1 seconde
      setTimeout(() => {
        window.location.href = "Site_officiel_menu.html"; // page cible
      }, 1000);

    } else {
      message.textContent = "Identifiants incorrects";
      message.className = "message error";
    }
  });
</script>

</body>
</html>
