<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation de recherche</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
    }

    .search-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 36px 42px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.10);
    }

    .spinner {
      width: 72px;
      height: 72px;
      border: 8px solid #dbe7ff;
      border-top: 8px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .text {
      font-size: 18px;
      font-weight: bold;
      color: #1f2937;
      letter-spacing: 0.3px;
    }

    .subtext {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="search-loader">
    <div class="spinner"></div>
    <div class="text">Recherche en cours...</div>
    <div class="subtext">Veuillez patienter pendant le chargement des résultats.</div>
  </div>

<script>
  
      // redirection après délai
      setTimeout(() => {
        window.location.href = "Page_scan.html";
      }, 1500);
   
</script>

</body>
</html>
