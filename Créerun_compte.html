<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Création de compte</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #d1d5db;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e0ecff, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }

    p.subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .checkbox input {
      width: auto;
      margin-top: 2px;
    }

    button {
      border: none;
      background: var(--primary);
      color: white;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .message {
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
      min-height: 20px;
    }

    .error {
      color: var(--danger);
    }

    .success {
      color: var(--success);
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Créer un compte</h1>
    <p class="subtitle">Renseignez vos informations pour ouvrir votre espace utilisateur.</p>

    <form id="accountForm">
      <div class="row">
        <div class="field">
          <label for="firstName">Prénom</label>
          <input type="text" id="firstName" name="firstName" placeholder="Jean" required />
        </div>
        <div class="field">
          <label for="lastName">Nom</label>
          <input type="text" id="lastName" name="lastName" placeholder="Dupont" required />
        </div>
      </div>

      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" placeholder="jean.dupont@email.com" required />
      </div>

      <div class="field">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="jeandupont" required />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Minimum 8 caractères" required />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Retapez votre mot de passe" required />
      </div>

      <label class="checkbox">
        <input type="checkbox" id="terms" required />
        <span>J'accepte les conditions d'utilisation et la politique de confidentialité.</span>
      </label>

      <button type="submit">Créer mon compte</button>
      <div id="message" class="message"></div>
    </form>

    <div class="footer">
      Déjà inscrit ? <a href="#">Se connecter</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('accountForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      message.textContent = '';
      message.className = 'message';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password.length < 8) {
        message.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
        message.classList.add('error');
        return;
      }

      if (password !== confirmPassword) {
        message.textContent = 'Les mots de passe ne correspondent pas.';
        message.classList.add('error');
        return;
      }

      message.textContent = 'Compte créé avec succès.';
      message.classList.add('success');
      form.reset();
    });
  </script>
</body>
</html>
