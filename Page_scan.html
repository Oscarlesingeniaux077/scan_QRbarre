<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Code-Barres - Bruit mécanique</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    video {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 2px solid #bbb;
      background: #000;
      margin-top: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 1.2em;
      font-weight: bold;
      color: #0b7a0b;
      word-break: break-word;
    }

    #status {
      margin-top: 8px;
      color: #666;
    }

    button {
      margin-top: 18px;
      padding: 12px 22px;
      font-size: 1em;
      border-radius: 8px;
      border: none;
      background: #0078d4;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #005ea6;
    }
  </style>
</head>
<body>

  <h1>Scanner de code-barres</h1>
  <p>Détection caméra avec bruit mécanique de tourniquet lors d’un scan valide.</p>

  <video id="video" autoplay playsinline></video>
  <br>
  <button id="startBtn">Démarrer le scanner</button>

  <div id="result">Aucun code détecté</div>
  <div id="status">En attente…</div>

  <script>
    const video = document.getElementById("video");
    const result = document.getElementById("result");
    const statusText = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    let stream = null;
    let detector = null;
    let scanning = false;
    let lastCode = "";
    let lastScanTime = 0;
    let audioContext = null;

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playTurnstileSound() {
      if (!audioContext) return;

      const now = audioContext.currentTime;

      // Gain global
      const master = audioContext.createGain();
      master.gain.setValueAtTime(0.18, now);
      master.connect(audioContext.destination);

      // Premier "clac" métallique
      const osc1 = audioContext.createOscillator();
      const gain1 = audioContext.createGain();
      osc1.type = "square";
      osc1.frequency.setValueAtTime(900, now);
      osc1.frequency.exponentialRampToValueAtTime(420, now + 0.035);

      gain1.gain.setValueAtTime(0.0001, now);
      gain1.gain.exponentialRampToValueAtTime(0.7, now + 0.003);
      gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);

      osc1.connect(gain1);
      gain1.connect(master);

      // Deuxième "clac" plus grave, simulant le verrouillage du tourniquet
      const osc2 = audioContext.createOscillator();
      const gain2 = audioContext.createGain();
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(260, now + 0.045);
      osc2.frequency.exponentialRampToValueAtTime(140, now + 0.10);

      gain2.gain.setValueAtTime(0.0001, now + 0.045);
      gain2.gain.exponentialRampToValueAtTime(0.5, now + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

      osc2.connect(gain2);
      gain2.connect(master);

      // Petit bruit sec pour donner un aspect mécanique
      const bufferSize = audioContext.sampleRate * 0.03;
      const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      const noise = audioContext.createBufferSource();
      const noiseFilter = audioContext.createBiquadFilter();
      const noiseGain = audioContext.createGain();

      noise.buffer = buffer;
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.setValueAtTime(1800, now);
      noiseFilter.Q.setValueAtTime(1.2, now);

      noiseGain.gain.setValueAtTime(0.0001, now + 0.01);
      noiseGain.gain.exponentialRampToValueAtTime(0.22, now + 0.012);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);

      osc1.start(now);
      osc1.stop(now + 0.06);

      osc2.start(now + 0.045);
      osc2.stop(now + 0.13);

      noise.start(now + 0.008);
      noise.stop(now + 0.05);
    }

    async function startScanner() {
      try {
        initAudio();

        if (!("BarcodeDetector" in window)) {
          statusText.textContent = "BarcodeDetector non pris en charge par ce navigateur.";
          result.textContent = "Navigateur non compatible.";
          return;
        }

        const formats = await BarcodeDetector.getSupportedFormats();
        detector = new BarcodeDetector({ formats });

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        scanning = true;
        statusText.textContent = "Caméra active. Scan en cours…";

        scanLoop();
      } catch (error) {
        console.error(error);
        statusText.textContent = "Erreur d’accès à la caméra.";
        result.textContent = "Vérifie les permissions caméra.";
      }
    }

    async function scanLoop() {
      if (!scanning || !detector) return;

      try {
        const barcodes = await detector.detect(video);

        if (barcodes.length > 0) {
          const code = barcodes[0].rawValue;
          const now = Date.now();

          // Anti-répétition pour éviter plusieurs sons sur le même code
          if (code !== lastCode || now - lastScanTime > 1500) {
            lastCode = code;
            lastScanTime = now;

            result.textContent = "Code détecté : " + code;
            statusText.textContent = "Scan valide.";
            playTurnstileSound();
          }
        }
      } catch (error) {
        console.error("Erreur de détection :", error);
        statusText.textContent = "Erreur pendant la détection.";
      }

      requestAnimationFrame(scanLoop);
    }

    startBtn.addEventListener("click", startScanner);

    window.addEventListener("beforeunload", () => {
      scanning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
