<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecteur de code-barres</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }
    #reader {
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
    }
    #result {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f7f7f7;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Lecteur de code-barres</h1>

  <div id="reader"></div>
  <div id="result">Aucun code détecté</div>

  <script>
    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById("result").textContent =
        "Code détecté : " + decodedText;

      // Optionnel : arrêter le scan après lecture
      html5QrcodeScanner.clear().catch(err => {
        console.error("Erreur lors de l'arrêt du scanner :", err);
      });
    }

    function onScanFailure(error) {
      // Ne rien afficher en continu pour éviter de polluer la console
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: { width: 250, height: 120 },
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
      },
      false
    );

    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
  </script>
</body>
</html>
